<?xml version="1.0" encoding="UTF-8"?>
<!-- Candidate A: "Sonic Bolt" — 稲妻×音波（タキオン速度×音声） -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1C0A40"/>
    </linearGradient>
    <linearGradient id="boltA" x1="0" y1="0" x2="0.3" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#C084FC"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glowA" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softA" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgA)"/>

  <!-- Subtle background radial glow -->
  <radialGradient id="centerGlowA" cx="50%" cy="50%" r="45%">
    <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#0A1628" stop-opacity="0"/>
  </radialGradient>
  <rect width="1024" height="1024" rx="180" fill="url(#centerGlowA)"/>

  <!-- Lightning bolt — glow layer -->
  <path d="M 572 148 L 362 532 L 488 532 L 416 876 L 692 454 L 558 454 Z"
        fill="#A78BFA" opacity="0.25" filter="url(#glowA)"/>
  <!-- Lightning bolt — main shape -->
  <path d="M 572 148 L 362 532 L 488 532 L 416 876 L 692 454 L 558 454 Z"
        fill="url(#boltA)" filter="url(#softA)"/>
  <!-- Lightning bolt — highlight edge -->
  <path d="M 572 148 L 362 532 L 488 532 L 416 876 L 692 454 L 558 454 Z"
        fill="none" stroke="#E0E7FF" stroke-width="2" opacity="0.3"/>

  <!-- Sound wave arcs — left (voice emanating) -->
  <path d="M 256 396 Q 204 512 256 628"
        stroke="#22D3EE" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M 196 324 Q 116 512 196 700"
        stroke="#22D3EE" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.48"/>
  <path d="M 138 255 Q 34 512 138 769"
        stroke="#22D3EE" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.24"/>

  <!-- Sound wave arcs — right (voice emanating) -->
  <path d="M 768 396 Q 820 512 768 628"
        stroke="#C084FC" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.75"/>
  <path d="M 828 324 Q 908 512 828 700"
        stroke="#C084FC" stroke-width="11" fill="none" stroke-linecap="round" opacity="0.48"/>
  <path d="M 886 255 Q 990 512 886 769"
        stroke="#C084FC" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.24"/>

  <!-- Tachyon particle dots -->
  <circle cx="306" cy="218" r="8" fill="#22D3EE" opacity="0.9"/>
  <circle cx="346" cy="182" r="5" fill="#C084FC" opacity="0.85"/>
  <circle cx="272" cy="176" r="3.5" fill="#22D3EE" opacity="0.65"/>
  <circle cx="726" cy="196" r="8" fill="#C084FC" opacity="0.9"/>
  <circle cx="762" cy="162" r="5" fill="#22D3EE" opacity="0.85"/>
  <circle cx="696" cy="158" r="3.5" fill="#C084FC" opacity="0.65"/>
  <circle cx="288" cy="796" r="6" fill="#22D3EE" opacity="0.75"/>
  <circle cx="748" cy="806" r="6" fill="#C084FC" opacity="0.75"/>

  <!-- Speed streak lines near bolt -->
  <line x1="190" y1="460" x2="310" y2="460" stroke="#22D3EE" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="210" y1="480" x2="300" y2="480" stroke="#22D3EE" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="720" y1="460" x2="840" y2="460" stroke="#C084FC" stroke-width="2.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="724" y1="480" x2="812" y2="480" stroke="#C084FC" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>
