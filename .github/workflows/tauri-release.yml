name: Tauri Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS ARM64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS x86_64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows x86_64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux x86_64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-release
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Ad-hoc codesign macOS app
        if: contains(matrix.target, 'apple-darwin')
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -n "$APP_PATH" ]; then
            codesign --force --deep -s - "$APP_PATH"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: ignore

  release:
    needs: build-tauri
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.exe" -o \
            -name "*.exe.sig" -o \
            -name "*.msi" -o \
            -name "*.msi.sig" -o \
            -name "*.AppImage" -o \
            -name "*.AppImage.sig" -o \
            -name "*.deb" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" \
          \) -exec cp {} release/ \;
          echo "Release files:"
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums-sha256.txt || true
          cat checksums-sha256.txt

      - name: Generate updater latest.json
        run: |
          TAG="${GITHUB_REF_NAME:-${{ github.event.inputs.version }}}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/quantum-box/tachyon-cowork/releases/download/${TAG}"

          # Read signature files
          read_sig() {
            local file="release/$1"
            if [ -f "$file" ]; then
              cat "$file"
            else
              echo ""
            fi
          }

          # Find actual filenames
          MACOS_AARCH64_TAR=$(ls release/*aarch64*.app.tar.gz 2>/dev/null | head -1 | xargs -r basename)
          MACOS_X86_TAR=$(ls release/*x86_64*.app.tar.gz 2>/dev/null | head -1 | xargs -r basename)
          # For macOS, if we don't have arch-specific names, use the generic one
          if [ -z "$MACOS_AARCH64_TAR" ] && [ -z "$MACOS_X86_TAR" ]; then
            MACOS_TAR=$(ls release/*.app.tar.gz 2>/dev/null | head -1 | xargs -r basename)
            MACOS_AARCH64_TAR="$MACOS_TAR"
            MACOS_X86_TAR="$MACOS_TAR"
          fi
          WINDOWS_MSI=$(ls release/*.msi 2>/dev/null | head -1 | xargs -r basename)
          WINDOWS_EXE=$(ls release/*.exe 2>/dev/null | grep -v '.sig$' | head -1 | xargs -r basename)
          LINUX_APPIMAGE=$(ls release/*.AppImage 2>/dev/null | grep -v '.sig$' | head -1 | xargs -r basename)

          # Build platforms JSON
          PLATFORMS="{}"

          if [ -n "$MACOS_AARCH64_TAR" ]; then
            SIG=$(read_sig "${MACOS_AARCH64_TAR}.sig")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE_URL}/${MACOS_AARCH64_TAR}" --arg sig "$SIG" '. + {"darwin-aarch64": {"url": $url, "signature": $sig}}')
          fi

          if [ -n "$MACOS_X86_TAR" ]; then
            SIG=$(read_sig "${MACOS_X86_TAR}.sig")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE_URL}/${MACOS_X86_TAR}" --arg sig "$SIG" '. + {"darwin-x86_64": {"url": $url, "signature": $sig}}')
          fi

          if [ -n "$WINDOWS_MSI" ]; then
            SIG=$(read_sig "${WINDOWS_MSI}.sig")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE_URL}/${WINDOWS_MSI}" --arg sig "$SIG" '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')
          fi

          if [ -n "$LINUX_APPIMAGE" ]; then
            SIG=$(read_sig "${LINUX_APPIMAGE}.sig")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg url "${BASE_URL}/${LINUX_APPIMAGE}" --arg sig "$SIG" '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg date "$DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, pub_date: $date, platforms: $platforms}' \
            > release/latest.json

          echo "Generated latest.json:"
          cat release/latest.json

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Tachyon Cowork ${{ steps.version.outputs.tag }}
          files: release/*
          generate_release_notes: true
          body: |
            ## Tachyon Cowork - ${{ steps.version.outputs.tag }}

            AI Assistant Desktop App

            ### Downloads

            | Platform | File |
            |----------|------|
            | macOS ARM64 (Apple Silicon) | `.dmg` |
            | macOS x86_64 (Intel) | `.dmg` |
            | Windows x86_64 | `.msi` / `.exe` |
            | Linux x86_64 | `.AppImage` / `.deb` |

            ### Checksums

            See `checksums-sha256.txt` for SHA-256 verification.
