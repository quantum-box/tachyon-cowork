name: Deploy Web (Cloudflare Workers)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'src-tauri/**'
      - '.github/workflows/tauri-release.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_COGNITO_DOMAIN: https://auth-pool.n1.tachy.one
          VITE_COGNITO_CLIENT_ID: 78a4raqiqns509aadtv7ftjmee
          VITE_COGNITO_REDIRECT_URI: https://cowork.txcloud.app/callback
          VITE_COGNITO_SCOPES: openid email profile
          VITE_API_BASE_URL: https://api.n1.tachy.one
          VITE_DEFAULT_TENANT_ID: tn_01hjryxysgey07h5jz5wagqj0m
        run: npx vite build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
